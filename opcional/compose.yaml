services:
  postgres:
    image: postgres:16
    container_name: l2a-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: elearning
    volumes:
      - postgres_data_l2a:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
  demo:
    build:
      context: ./demo-app
    container_name: l2a-demo
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: elearning

volumes:
  postgres_data_l2a:
